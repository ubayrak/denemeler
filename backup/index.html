<!DOCTYPE html>
<html>
<head>
    <title>Simple Sniffer</title>
</head>
<body>

<h2>Sniffer Control</h2>

<form method="POST">

    <h3>Select Bands</h3>

    <input type="checkbox" name="band" value="2.4GHz"> 2.4GHz
    Channel: <input type="text" name="channel_2.4GHz"><br><br>

    <input type="checkbox" name="band" value="5GHz"> 5GHz
    Channel: <input type="text" name="channel_5GHz"><br><br>

    <input type="checkbox" name="band" value="6GHz"> 6GHz
    Channel: <input type="text" name="channel_6GHz"><br><br>

    <button type="submit" name="start">Start Sniff</button>
    <button type="submit" name="stop">Stop Sniff</button>

</form>

</body>
</html>
